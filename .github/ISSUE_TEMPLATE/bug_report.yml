name: Bug Report
description: Report a bug in InfraGuardian360
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as possible.

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Phase 1 — Core (NetBox/Keycloak/Traefik)
        - Phase 2 — Discovery (Netdisco)
        - Phase 3 — Monitoring (HertzBeat/Prometheus)
        - Phase 4 — APM (SigNoz/ClickHouse)
        - Phase 5 — Logging (OpenSearch/Fluent Bit)
        - Device template
        - Agent script
        - install.sh
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run docker compose...
        2. Navigate to...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: Ubuntu 24.04
        Docker: 26.0.0
        Server RAM: 16GB
        Phase deployed: 1-3
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
      placeholder: Paste docker logs output here