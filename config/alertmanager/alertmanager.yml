# ============================================================
#  InfraGuardian360 — Alertmanager Configuration
#  Note: Variables like IG360_EMAIL are replaced by install.sh
#        using sed substitution on first deployment
# ============================================================

global:
  resolve_timeout: 5m
  smtp_from: 'alerts@infraguardian360.local'
  smtp_smarthost: 'smtp.example.com:587'
  smtp_auth_username: 'IG360_SMTP_USER'
  smtp_auth_password: 'IG360_SMTP_PASSWORD'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'default'
    email_configs:
      - to: 'IG360_ADMIN_EMAIL'
        send_resolved: true

  - name: 'critical'
    email_configs:
      - to: 'IG360_ADMIN_EMAIL'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] InfraGuardian360 Alert: {{ .GroupLabels.alertname }}'
    slack_configs:
      - api_url: 'IG360_SLACK_WEBHOOK'
        channel: '#ig360-alerts'
        send_resolved: true
        title: '🔴 CRITICAL: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Device:* {{ .Labels.instance }}
          {{ end }}

  - name: 'warning'
    email_configs:
      - to: 'IG360_ADMIN_EMAIL'
        send_resolved: true
        headers:
          Subject: '[WARNING] InfraGuardian360 Alert: {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']