global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "alerts@infraguardian360.local"

route:
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: critical
    - match:
        severity: warning
      receiver: default

receivers:
  - name: default
    email_configs:
      - to: "${NETBOX_ADMIN_EMAIL}"
        send_resolved: true

  - name: critical
    email_configs:
      - to: "${NETBOX_ADMIN_EMAIL}"
        send_resolved: true
        headers:
          Subject: "CRITICAL - InfraGuardian360 Alert: {{ .GroupLabels.alertname }}"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]