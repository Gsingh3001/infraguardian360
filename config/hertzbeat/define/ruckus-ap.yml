# ===========================================================
#  InfraGuardian360 — HertzBeat Monitor Template
#  Device: Ruckus / CommScope Access Points
#  Covers: Ruckus R300, R500, R600, R700, R750, R850
#          Ruckus T300/T350 outdoor APs
#          Managed via ZoneDirector or SmartZone controller
#  Protocol: SNMP v2c/v3
#  Vendor OID: .1.3.6.1.4.1.25053 (Ruckus Wireless)
# ===========================================================

category: network
app: ruckus_ap
name:
  zh-CN: Ruckus 无线AP
  en-US: Ruckus / CommScope Access Point

params:
  - field: host
    name:
      en-US: AP IP Address
    type: host
    required: true
  - field: port
    name:
      en-US: SNMP Port
    type: number
    defaultValue: 161
    required: true
  - field: snmpVersion
    name:
      en-US: SNMP Version
    type: radio
    required: true
    options:
      - label: "v2c"
        value: 2
      - label: "v3"
        value: 3
    defaultValue: 2
  - field: community
    name:
      en-US: SNMP Community
    type: text
    defaultValue: public
  - field: snmpUsername
    name:
      en-US: SNMP v3 Username
    type: text
    required: false
    hide: true
  - field: snmpAuthPassword
    name:
      en-US: Auth Password
    type: password
    required: false
    hide: true
  - field: snmpPrivPassword
    name:
      en-US: Priv Password
    type: password
    required: false
    hide: true

metrics:

  - name: ap_info
    priority: 0
    fields:
      - field: ap_name
        type: 1
        label: true
      - field: model
        type: 1
      - field: serial_number
        type: 1
      - field: firmware_version
        type: 1
      - field: ap_status
        type: 1
      - field: uptime_seconds
        type: 0
        unit: s
      - field: total_clients
        type: 0
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      username: ^_^snmpUsername^_^
      authPassword: ^_^snmpAuthPassword^_^
      privPassword: ^_^snmpPrivPassword^_^
      timeout: 10000
      oids:
        ap_name:          1.3.6.1.2.1.1.5.0
        model:            1.3.6.1.4.1.25053.1.3.2.1.1.1.1.2.1
        serial_number:    1.3.6.1.4.1.25053.1.3.2.1.1.1.1.3.1
        firmware_version: 1.3.6.1.4.1.25053.1.3.2.1.1.1.1.4.1
        ap_status:        1.3.6.1.4.1.25053.1.3.2.1.1.1.1.5.1
        uptime_seconds:   1.3.6.1.2.1.1.3.0
        total_clients:    1.3.6.1.4.1.25053.1.3.2.1.1.1.1.15.1

  - name: radio_24ghz
    priority: 1
    fields:
      - field: channel
        type: 0
      - field: tx_power_dbm
        type: 0
        unit: dBm
      - field: noise_floor_dbm
        type: 0
        unit: dBm
      - field: channel_utilisation_percent
        type: 0
        unit: '%'
      - field: clients_count
        type: 0
      - field: tx_bytes
        type: 0
        unit: bytes
      - field: rx_bytes
        type: 0
        unit: bytes
      - field: tx_retries_percent
        type: 0
        unit: '%'
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      username: ^_^snmpUsername^_^
      authPassword: ^_^snmpAuthPassword^_^
      privPassword: ^_^snmpPrivPassword^_^
      timeout: 10000
      oids:
        channel:                    1.3.6.1.4.1.25053.1.3.2.1.1.2.1.4.1
        tx_power_dbm:               1.3.6.1.4.1.25053.1.3.2.1.1.2.1.5.1
        noise_floor_dbm:            1.3.6.1.4.1.25053.1.3.2.1.1.2.1.6.1
        channel_utilisation_percent: 1.3.6.1.4.1.25053.1.3.2.1.1.2.1.7.1
        clients_count:              1.3.6.1.4.1.25053.1.3.2.1.1.2.1.8.1
        tx_bytes:                   1.3.6.1.4.1.25053.1.3.2.1.1.2.1.9.1
        rx_bytes:                   1.3.6.1.4.1.25053.1.3.2.1.1.2.1.10.1
        tx_retries_percent:         1.3.6.1.4.1.25053.1.3.2.1.1.2.1.11.1

  - name: radio_5ghz
    priority: 2
    fields:
      - field: channel
        type: 0
      - field: tx_power_dbm
        type: 0
        unit: dBm
      - field: noise_floor_dbm
        type: 0
        unit: dBm
      - field: channel_utilisation_percent
        type: 0
        unit: '%'
      - field: clients_count
        type: 0
      - field: tx_bytes
        type: 0
        unit: bytes
      - field: rx_bytes
        type: 0
        unit: bytes
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      username: ^_^snmpUsername^_^
      authPassword: ^_^snmpAuthPassword^_^
      privPassword: ^_^snmpPrivPassword^_^
      timeout: 10000
      oids:
        channel:                    1.3.6.1.4.1.25053.1.3.2.1.1.2.1.4.2
        tx_power_dbm:               1.3.6.1.4.1.25053.1.3.2.1.1.2.1.5.2
        noise_floor_dbm:            1.3.6.1.4.1.25053.1.3.2.1.1.2.1.6.2
        channel_utilisation_percent: 1.3.6.1.4.1.25053.1.3.2.1.1.2.1.7.2
        clients_count:              1.3.6.1.4.1.25053.1.3.2.1.1.2.1.8.2
        tx_bytes:                   1.3.6.1.4.1.25053.1.3.2.1.1.2.1.9.2
        rx_bytes:                   1.3.6.1.4.1.25053.1.3.2.1.1.2.1.10.2

alerts:
  - metric: ap_info
    field: ap_status
    preset: true
    expr: "ap_status != 1"
    for: 3m
    severity: critical
    content: "Ruckus AP ${host} status is ${ap_status} — check controller"

  - metric: radio_24ghz
    field: channel_utilisation_percent
    preset: true
    expr: "channel_utilisation_percent > 80"
    for: 10m
    severity: warning
    content: "Ruckus AP ${host} 2.4GHz channel utilisation at ${channel_utilisation_percent}%"

  - metric: radio_5ghz
    field: channel_utilisation_percent
    preset: true
    expr: "channel_utilisation_percent > 80"
    for: 10m
    severity: warning
    content: "Ruckus AP ${host} 5GHz channel utilisation at ${channel_utilisation_percent}%"

  - metric: ap_info
    field: total_clients
    preset: true
    expr: "total_clients > 60"
    for: 5m
    severity: warning
    content: "Ruckus AP ${host} has ${total_clients} clients — high load"