# ===========================================================
#  InfraGuardian360 — HertzBeat Monitor Template
#  Device: HPE ProLiant Server (iLO 4/5/6)
#  Covers: DL360, DL380, DL560, DL580, ML series
#  Protocol: SNMP v2c/v3 (CPQHLTH-MIB, CPQSINFO-MIB)
#  Vendor OID: .1.3.6.1.4.1.232 (Hewlett-Packard)
#  Note: Enable SNMP in iLO — Administration > Management > SNMP
# ===========================================================

category: server
app: hpe_ilo_server
name:
  zh-CN: HPE ProLiant 服务器 (iLO)
  en-US: HPE ProLiant Server (iLO)

params:
  - field: host
    name:
      en-US: iLO IP Address
    type: host
    required: true
  - field: port
    name:
      en-US: SNMP Port
    type: number
    defaultValue: 161
    required: true
  - field: snmpVersion
    name:
      en-US: SNMP Version
    type: radio
    required: true
    options:
      - label: "v2c"
        value: 2
      - label: "v3"
        value: 3
    defaultValue: 2
  - field: community
    name:
      en-US: SNMP Community
    type: text
    defaultValue: public
  - field: snmpUsername
    name:
      en-US: SNMP v3 Username
    type: text
    required: false
    hide: true
  - field: snmpAuthPassword
    name:
      en-US: Auth Password
    type: password
    required: false
    hide: true
  - field: snmpPrivPassword
    name:
      en-US: Priv Password
    type: password
    required: false
    hide: true

metrics:

  - name: server_info
    priority: 0
    fields:
      - field: server_name
        type: 1
        label: true
      - field: product_name
        type: 1
      - field: serial_number
        type: 1
      - field: ilo_version
        type: 1
      - field: bios_version
        type: 1
      - field: overall_health
        type: 1
      - field: uptime_minutes
        type: 0
        unit: min
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      username: ^_^snmpUsername^_^
      authPassword: ^_^snmpAuthPassword^_^
      privPassword: ^_^snmpPrivPassword^_^
      timeout: 15000
      oids:
        server_name:    1.3.6.1.2.1.1.5.0
        product_name:   1.3.6.1.4.1.232.2.2.4.2.0
        serial_number:  1.3.6.1.4.1.232.2.2.2.1.0
        ilo_version:    1.3.6.1.4.1.232.9.2.2.1.0
        bios_version:   1.3.6.1.4.1.232.2.2.4.1.0
        overall_health: 1.3.6.1.4.1.232.6.1.3.0
        uptime_minutes: 1.3.6.1.4.1.232.1.2.2.1.0

  - name: cpu_info
    priority: 1
    fields:
      - field: cpu_name
        type: 1
        label: true
      - field: cpu_status
        type: 1
      - field: cpu_speed_mhz
        type: 0
        unit: MHz
      - field: cpu_cores
        type: 0
      - field: cpu_threads
        type: 0
      - field: cpu_stepping
        type: 1
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      username: ^_^snmpUsername^_^
      authPassword: ^_^snmpAuthPassword^_^
      privPassword: ^_^snmpPrivPassword^_^
      timeout: 15000
      oids:
        cpu_name:       1.3.6.1.4.1.232.1.2.2.1.1.4
        cpu_status:     1.3.6.1.4.1.232.1.2.2.1.1.6
        cpu_speed_mhz:  1.3.6.1.4.1.232.1.2.2.1.1.15
        cpu_cores:      1.3.6.1.4.1.232.1.2.2.1.1.25
        cpu_threads:    1.3.6.1.4.1.232.1.2.2.1.1.26
        cpu_stepping:   1.3.6.1.4.1.232.1.2.2.1.1.8

  - name: memory
    priority: 2
    fields:
      - field: dimm_location
        type: 1
        label: true
      - field: dimm_status
        type: 1
      - field: dimm_size_mb
        type: 0
        unit: MB
      - field: dimm_speed_mhz
        type: 0
        unit: MHz
      - field: dimm_type
        type: 1
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      username: ^_^snmpUsername^_^
      authPassword: ^_^snmpAuthPassword^_^
      privPassword: ^_^snmpPrivPassword^_^
      timeout: 15000
      oids:
        dimm_location:  1.3.6.1.4.1.232.6.2.14.13.1.20
        dimm_status:    1.3.6.1.4.1.232.6.2.14.13.1.19
        dimm_size_mb:   1.3.6.1.4.1.232.6.2.14.13.1.6
        dimm_speed_mhz: 1.3.6.1.4.1.232.6.2.14.13.1.15
        dimm_type:      1.3.6.1.4.1.232.6.2.14.13.1.9

  - name: storage
    priority: 3
    fields:
      - field: drive_location
        type: 1
        label: true
      - field: drive_status
        type: 1
      - field: drive_condition
        type: 1
      - field: drive_size_mb
        type: 0
        unit: MB
      - field: drive_model
        type: 1
      - field: drive_serial
        type: 1
      - field: smart_status
        type: 1
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      username: ^_^snmpUsername^_^
      authPassword: ^_^snmpAuthPassword^_^
      privPassword: ^_^snmpPrivPassword^_^
      timeout: 15000
      oids:
        drive_location: 1.3.6.1.4.1.232.3.2.5.1.1.64
        drive_status:   1.3.6.1.4.1.232.3.2.5.1.1.6
        drive_condition: 1.3.6.1.4.1.232.3.2.5.1.1.37
        drive_size_mb:  1.3.6.1.4.1.232.3.2.5.1.1.45
        drive_model:    1.3.6.1.4.1.232.3.2.5.1.1.2
        drive_serial:   1.3.6.1.4.1.232.3.2.5.1.1.51
        smart_status:   1.3.6.1.4.1.232.3.2.5.1.1.57

  - name: power_supplies
    priority: 4
    fields:
      - field: psu_bay
        type: 1
        label: true
      - field: psu_status
        type: 1
      - field: psu_condition
        type: 1
      - field: psu_present
        type: 1
      - field: psu_capacity_watts
        type: 0
        unit: W
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      username: ^_^snmpUsername^_^
      authPassword: ^_^snmpAuthPassword^_^
      privPassword: ^_^snmpPrivPassword^_^
      timeout: 15000
      oids:
        psu_bay:           1.3.6.1.4.1.232.6.2.9.3.1.4
        psu_status:        1.3.6.1.4.1.232.6.2.9.3.1.5
        psu_condition:     1.3.6.1.4.1.232.6.2.9.3.1.9
        psu_present:       1.3.6.1.4.1.232.6.2.9.3.1.3
        psu_capacity_watts: 1.3.6.1.4.1.232.6.2.9.3.1.7

  - name: temperature_sensors
    priority: 5
    fields:
      - field: sensor_name
        type: 1
        label: true
      - field: sensor_location
        type: 1
      - field: temp_celsius
        type: 0
        unit: celsius
      - field: temp_status
        type: 1
      - field: warning_threshold
        type: 0
        unit: celsius
      - field: critical_threshold
        type: 0
        unit: celsius
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      username: ^_^snmpUsername^_^
      authPassword: ^_^snmpAuthPassword^_^
      privPassword: ^_^snmpPrivPassword^_^
      timeout: 15000
      oids:
        sensor_name:        1.3.6.1.4.1.232.6.2.6.8.1.4
        sensor_location:    1.3.6.1.4.1.232.6.2.6.8.1.5
        temp_celsius:       1.3.6.1.4.1.232.6.2.6.8.1.6
        temp_status:        1.3.6.1.4.1.232.6.2.6.8.1.9
        warning_threshold:  1.3.6.1.4.1.232.6.2.6.8.1.7
        critical_threshold: 1.3.6.1.4.1.232.6.2.6.8.1.8

  - name: fan_sensors
    priority: 6
    fields:
      - field: fan_location
        type: 1
        label: true
      - field: fan_status
        type: 1
      - field: fan_condition
        type: 1
      - field: fan_speed_percent
        type: 0
        unit: '%'
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      username: ^_^snmpUsername^_^
      authPassword: ^_^snmpAuthPassword^_^
      privPassword: ^_^snmpPrivPassword^_^
      timeout: 15000
      oids:
        fan_location:      1.3.6.1.4.1.232.6.2.6.7.1.4
        fan_status:        1.3.6.1.4.1.232.6.2.6.7.1.9
        fan_condition:     1.3.6.1.4.1.232.6.2.6.7.1.6
        fan_speed_percent: 1.3.6.1.4.1.232.6.2.6.7.1.12

alerts:
  - metric: server_info
    field: overall_health
    preset: true
    expr: "overall_health == 4 || overall_health == 3"
    for: 1m
    severity: critical
    content: "HPE Server ${host} overall health is CRITICAL — check iLO"

  - metric: storage
    field: drive_condition
    preset: true
    expr: "drive_condition == 3 || drive_condition == 4"
    for: 1m
    severity: critical
    content: "HPE Server ${host} drive ${drive_location} condition is ${drive_condition} — replace immediately"

  - metric: storage
    field: smart_status
    preset: true
    expr: "smart_status == 3"
    for: 1m
    severity: warning
    content: "HPE Server ${host} drive ${drive_location} SMART predicting failure"

  - metric: temperature_sensors
    field: temp_celsius
    preset: true
    expr: "temp_celsius > critical_threshold"
    for: 1m
    severity: critical
    content: "HPE Server ${host} ${sensor_name} is ${temp_celsius}°C — exceeds critical threshold"

  - metric: power_supplies
    field: psu_condition
    preset: true
    expr: "psu_condition != 2"
    for: 1m
    severity: critical
    content: "HPE Server ${host} PSU ${psu_bay} condition is ${psu_condition}"