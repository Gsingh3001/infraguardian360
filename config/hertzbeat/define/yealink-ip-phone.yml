# ===========================================================
#  InfraGuardian360 — HertzBeat Monitor Template
#  Device: Yealink IP Phones (T2x, T4x, T5x, T6x series)
#  Very common in UK SMEs, NHS sites, law firms
#  Protocol: SNMP v2c + HTTP (Yealink web API)
#  Vendor OID: .1.3.6.1.4.1.35904 (Yealink)
# ===========================================================

category: network
app: yealink_ip_phone
name:
  zh-CN: Yealink IP 电话
  en-US: Yealink IP Phone

params:
  - field: host
    name:
      en-US: Phone IP Address
    type: host
    required: true
  - field: port
    name:
      en-US: SNMP Port
    type: number
    defaultValue: 161
    required: true
  - field: snmpVersion
    name:
      en-US: SNMP Version
    type: radio
    required: true
    options:
      - label: "v2c"
        value: 2
    defaultValue: 2
  - field: community
    name:
      en-US: SNMP Community
    type: text
    defaultValue: public
  - field: webPort
    name:
      en-US: Web UI Port
    type: number
    defaultValue: 80
  - field: webUsername
    name:
      en-US: Web UI Username
    type: text
    defaultValue: admin
  - field: webPassword
    name:
      en-US: Web UI Password
    type: password
    defaultValue: admin

metrics:

  - name: phone_info
    priority: 0
    fields:
      - field: phone_name
        type: 1
        label: true
      - field: model
        type: 1
      - field: mac_address
        type: 1
      - field: firmware_version
        type: 1
      - field: uptime_seconds
        type: 0
        unit: s
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 10000
      oids:
        phone_name:       1.3.6.1.2.1.1.5.0
        model:            1.3.6.1.4.1.35904.1.3.2.0
        mac_address:      1.3.6.1.4.1.35904.1.3.3.0
        firmware_version: 1.3.6.1.4.1.35904.1.3.4.0
        uptime_seconds:   1.3.6.1.2.1.1.3.0

  - name: sip_accounts
    priority: 1
    fields:
      - field: account_label
        type: 1
        label: true
      - field: sip_server
        type: 1
      - field: registration_status
        type: 1
      - field: sip_user
        type: 1
      - field: active_calls
        type: 0
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 10000
      oids:
        account_label:       1.3.6.1.4.1.35904.1.6.1.1.2
        sip_server:          1.3.6.1.4.1.35904.1.6.1.1.3
        registration_status: 1.3.6.1.4.1.35904.1.6.1.1.4
        sip_user:            1.3.6.1.4.1.35904.1.6.1.1.5
        active_calls:        1.3.6.1.4.1.35904.1.6.1.1.6

  - name: call_quality
    priority: 2
    fields:
      - field: mos_score
        type: 0
      - field: jitter_ms
        type: 0
        unit: ms
      - field: packet_loss_percent
        type: 0
        unit: '%'
      - field: round_trip_ms
        type: 0
        unit: ms
      - field: codec
        type: 1
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 10000
      oids:
        mos_score:           1.3.6.1.4.1.35904.1.7.1.0
        jitter_ms:           1.3.6.1.4.1.35904.1.7.2.0
        packet_loss_percent: 1.3.6.1.4.1.35904.1.7.3.0
        round_trip_ms:       1.3.6.1.4.1.35904.1.7.4.0
        codec:               1.3.6.1.4.1.35904.1.7.5.0

  - name: network_info
    priority: 3
    fields:
      - field: vlan_id
        type: 0
      - field: lldp_switch_port
        type: 1
      - field: lldp_switch_name
        type: 1
      - field: poe_class
        type: 1
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 10000
      oids:
        vlan_id:         1.3.6.1.4.1.35904.1.3.10.0
        lldp_switch_port: 1.3.6.1.4.1.35904.1.3.11.0
        lldp_switch_name: 1.3.6.1.4.1.35904.1.3.12.0
        poe_class:        1.3.6.1.4.1.35904.1.3.13.0

alerts:
  - metric: sip_accounts
    field: registration_status
    preset: true
    expr: "registration_status != 1"
    for: 5m
    severity: critical
    content: "Yealink phone ${host} account ${account_label} is NOT registered to ${sip_server}"

  - metric: call_quality
    field: mos_score
    preset: true
    expr: "mos_score < 3.5 && mos_score > 0"
    for: 5m
    severity: warning
    content: "Yealink phone ${host} MOS score ${mos_score} — poor call quality"

  - metric: call_quality
    field: jitter_ms
    preset: true
    expr: "jitter_ms > 30"
    for: 5m
    severity: warning
    content: "Yealink phone ${host} jitter is ${jitter_ms}ms"

  - metric: call_quality
    field: packet_loss_percent
    preset: true
    expr: "packet_loss_percent > 1"
    for: 5m
    severity: warning
    content: "Yealink phone ${host} packet loss is ${packet_loss_percent}%"