# ===========================================================
#  InfraGuardian360 — HertzBeat Monitor Template
#  Device: Xerox AltaLink / VersaLink / WorkCentre MFPs
#  Covers: AltaLink C8000/B8000, VersaLink C/B series,
#          WorkCentre 3/5/6/7 series, Phaser series
#  Protocol: SNMP v1/v2c (PRINTER-MIB + Xerox vendor MIBs)
#  Vendor OID: .1.3.6.1.4.1.253 (Xerox)
# ===========================================================

category: network
app: xerox_mfp_printer
name:
  zh-CN: 施乐 MFP 打印机
  en-US: Xerox MFP Printer

params:
  - field: host
    name:
      en-US: Host Address
    type: host
    required: true
  - field: port
    name:
      en-US: SNMP Port
    type: number
    defaultValue: 161
    required: true
  - field: snmpVersion
    name:
      en-US: SNMP Version
    type: radio
    required: true
    options:
      - label: "v1"
        value: 1
      - label: "v2c"
        value: 2
    defaultValue: 1
  - field: community
    name:
      en-US: SNMP Community
    type: text
    defaultValue: public

metrics:

  - name: printer_info
    priority: 0
    fields:
      - field: printer_name
        type: 1
        label: true
      - field: model
        type: 1
      - field: serial_number
        type: 1
      - field: firmware_version
        type: 1
      - field: asset_tag
        type: 1
      - field: printer_status
        type: 1
      - field: uptime_seconds
        type: 0
        unit: s
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 15000
      oids:
        printer_name:     1.3.6.1.2.1.1.5.0
        model:            1.3.6.1.4.1.253.8.53.3.2.1.3.1
        serial_number:    1.3.6.1.4.1.253.8.53.3.2.1.3.3
        firmware_version: 1.3.6.1.4.1.253.8.53.3.2.1.3.5
        asset_tag:        1.3.6.1.4.1.253.8.53.3.2.1.3.7
        printer_status:   1.3.6.1.2.1.25.3.5.1.1.1
        uptime_seconds:   1.3.6.1.2.1.1.3.0

  - name: consumables
    priority: 1
    fields:
      - field: marker_name
        type: 1
        label: true
      - field: marker_color
        type: 1
      - field: max_capacity
        type: 0
      - field: current_level
        type: 0
      - field: level_percent
        type: 0
        unit: '%'
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 15000
      oids:
        marker_name:   1.3.6.1.2.1.43.11.1.1.6.1
        marker_color:  1.3.6.1.2.1.43.12.1.1.4.1
        max_capacity:  1.3.6.1.2.1.43.11.1.1.8.1
        current_level: 1.3.6.1.2.1.43.11.1.1.9.1

  - name: xerox_toner
    priority: 2
    fields:
      - field: black_toner_percent
        type: 0
        unit: '%'
      - field: cyan_toner_percent
        type: 0
        unit: '%'
      - field: magenta_toner_percent
        type: 0
        unit: '%'
      - field: yellow_toner_percent
        type: 0
        unit: '%'
      - field: drum_cartridge_percent
        type: 0
        unit: '%'
      - field: fuser_percent
        type: 0
        unit: '%'
      - field: waste_toner_percent
        type: 0
        unit: '%'
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 15000
      oids:
        black_toner_percent:   1.3.6.1.4.1.253.8.53.13.2.1.6.1.20.1
        cyan_toner_percent:    1.3.6.1.4.1.253.8.53.13.2.1.6.1.20.2
        magenta_toner_percent: 1.3.6.1.4.1.253.8.53.13.2.1.6.1.20.3
        yellow_toner_percent:  1.3.6.1.4.1.253.8.53.13.2.1.6.1.20.4
        drum_cartridge_percent: 1.3.6.1.4.1.253.8.53.13.2.1.6.1.20.5
        fuser_percent:         1.3.6.1.4.1.253.8.53.13.2.1.6.1.20.6
        waste_toner_percent:   1.3.6.1.4.1.253.8.53.13.2.1.6.1.20.7

  - name: page_counts
    priority: 3
    fields:
      - field: total_impressions
        type: 0
      - field: colour_impressions
        type: 0
      - field: mono_impressions
        type: 0
      - field: copy_impressions
        type: 0
      - field: print_impressions
        type: 0
      - field: scan_images
        type: 0
      - field: fax_images
        type: 0
      - field: large_format_pages
        type: 0
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 15000
      oids:
        total_impressions:  1.3.6.1.4.1.253.8.53.13.2.1.6.1.4.1
        colour_impressions: 1.3.6.1.4.1.253.8.53.13.2.1.6.1.4.2
        mono_impressions:   1.3.6.1.4.1.253.8.53.13.2.1.6.1.4.3
        copy_impressions:   1.3.6.1.4.1.253.8.53.13.2.1.6.1.4.4
        print_impressions:  1.3.6.1.4.1.253.8.53.13.2.1.6.1.4.5
        scan_images:        1.3.6.1.4.1.253.8.53.13.2.1.6.1.4.6
        fax_images:         1.3.6.1.4.1.253.8.53.13.2.1.6.1.4.7
        large_format_pages: 1.3.6.1.4.1.253.8.53.13.2.1.6.1.4.8

  - name: paper_trays
    priority: 4
    fields:
      - field: tray_name
        type: 1
        label: true
      - field: tray_status
        type: 1
      - field: tray_media_size
        type: 1
      - field: tray_capacity
        type: 0
      - field: tray_level
        type: 0
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 15000
      oids:
        tray_name:       1.3.6.1.2.1.43.8.2.1.13.1
        tray_status:     1.3.6.1.2.1.43.8.2.1.11.1
        tray_media_size: 1.3.6.1.2.1.43.8.2.1.15.1
        tray_capacity:   1.3.6.1.2.1.43.8.2.1.9.1
        tray_level:      1.3.6.1.2.1.43.8.2.1.10.1

alerts:
  - metric: xerox_toner
    field: black_toner_percent
    preset: true
    expr: "black_toner_percent < 10"
    for: 1m
    severity: critical
    content: "Xerox printer ${host} black toner critically low at ${black_toner_percent}%"

  - metric: xerox_toner
    field: black_toner_percent
    preset: true
    expr: "black_toner_percent < 20"
    for: 1m
    severity: warning
    content: "Xerox printer ${host} black toner low at ${black_toner_percent}% — order replacement"

  - metric: xerox_toner
    field: waste_toner_percent
    preset: true
    expr: "waste_toner_percent > 90"
    for: 1m
    severity: warning
    content: "Xerox printer ${host} waste toner container at ${waste_toner_percent}% — empty soon"

  - metric: printer_info
    field: printer_status
    preset: true
    expr: "printer_status == 5"
    for: 2m
    severity: critical
    content: "Xerox printer ${host} is in ERROR state"