# ===========================================================
#  InfraGuardian360 — HertzBeat Monitor Template
#  Device: VMware NSX-T Manager / NSX-V Manager
#  Protocol: HTTP/REST API + SNMP
#  Used in: VMware vSphere environments, NHS trusts, banks
# ===========================================================

category: network
app: vmware_nsx_manager
name:
  zh-CN: VMware NSX 管理器
  en-US: VMware NSX Manager

params:
  - field: host
    name:
      en-US: NSX Manager IP/Hostname
    type: host
    required: true
  - field: port
    name:
      en-US: API Port
    type: number
    defaultValue: 443
    required: true
  - field: username
    name:
      en-US: Admin Username
    type: text
    defaultValue: admin
    required: true
  - field: password
    name:
      en-US: Admin Password
    type: password
    required: true
  - field: ssl
    name:
      en-US: Enable SSL
    type: boolean
    defaultValue: true
  - field: snmpPort
    name:
      en-US: SNMP Port
    type: number
    defaultValue: 161
  - field: community
    name:
      en-US: SNMP Community
    type: text
    defaultValue: public

metrics:

  - name: cluster_status
    priority: 0
    fields:
      - field: cluster_id
        type: 1
        label: true
      - field: cluster_status
        type: 1
      - field: control_cluster_status
        type: 1
      - field: mgmt_cluster_status
        type: 1
      - field: node_count
        type: 0
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      url: /api/v1/cluster/status
      method: GET
      ssl: ^_^ssl^_^
      basicAuthUsername: ^_^username^_^
      basicAuthPassword: ^_^password^_^
      parseType: jsonPath
      parseScript: "$.mgmt_cluster_status"

  - name: transport_nodes
    priority: 1
    fields:
      - field: node_name
        type: 1
        label: true
      - field: node_type
        type: 1
      - field: node_status
        type: 1
      - field: tunnel_status
        type: 1
      - field: os_type
        type: 1
      - field: nsx_version
        type: 1
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      url: /api/v1/transport-nodes/status
      method: GET
      ssl: ^_^ssl^_^
      basicAuthUsername: ^_^username^_^
      basicAuthPassword: ^_^password^_^
      parseType: jsonPath
      parseScript: "$.results[*]"

  - name: logical_switches
    priority: 2
    fields:
      - field: switch_name
        type: 1
        label: true
      - field: admin_state
        type: 1
      - field: replication_mode
        type: 1
      - field: vni
        type: 0
      - field: port_count
        type: 0
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      url: /api/v1/logical-switches
      method: GET
      ssl: ^_^ssl^_^
      basicAuthUsername: ^_^username^_^
      basicAuthPassword: ^_^password^_^
      parseType: jsonPath
      parseScript: "$.results[*]"

  - name: nsx_edges
    priority: 3
    fields:
      - field: edge_name
        type: 1
        label: true
      - field: edge_status
        type: 1
      - field: ha_status
        type: 1
      - field: edge_type
        type: 1
      - field: cpu_usage_percent
        type: 0
        unit: '%'
      - field: memory_usage_percent
        type: 0
        unit: '%'
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      url: /api/v1/edge-clusters
      method: GET
      ssl: ^_^ssl^_^
      basicAuthUsername: ^_^username^_^
      basicAuthPassword: ^_^password^_^
      parseType: jsonPath
      parseScript: "$.results[*]"

  - name: firewall_stats
    priority: 4
    fields:
      - field: total_rules
        type: 0
      - field: active_connections
        type: 0
      - field: packets_dropped
        type: 0
      - field: bytes_dropped
        type: 0
    protocol: http
    http:
      host: ^_^host^_^
      port: ^_^port^_^
      url: /api/v1/firewall/stats
      method: GET
      ssl: ^_^ssl^_^
      basicAuthUsername: ^_^username^_^
      basicAuthPassword: ^_^password^_^
      parseType: jsonPath
      parseScript: "$"

  - name: system_health
    priority: 5
    fields:
      - field: hostname
        type: 1
        label: true
      - field: cpu_usage_percent
        type: 0
        unit: '%'
      - field: memory_usage_percent
        type: 0
        unit: '%'
      - field: disk_usage_percent
        type: 0
        unit: '%'
      - field: uptime_seconds
        type: 0
        unit: s
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^snmpPort^_^
      version: 2
      community: ^_^community^_^
      timeout: 10000
      oids:
        hostname:            1.3.6.1.2.1.1.5.0
        uptime_seconds:      1.3.6.1.2.1.1.3.0

alerts:
  - metric: cluster_status
    field: cluster_status
    preset: true
    expr: "cluster_status != 'STABLE'"
    for: 2m
    severity: critical
    content: "NSX Manager ${host} cluster status is ${cluster_status} — investigate immediately"

  - metric: transport_nodes
    field: node_status
    preset: true
    expr: "node_status != 'UP'"
    for: 3m
    severity: critical
    content: "NSX Transport Node ${node_name} status is ${node_status}"

  - metric: nsx_edges
    field: edge_status
    preset: true
    expr: "edge_status != 'UP'"
    for: 2m
    severity: critical
    content: "NSX Edge ${edge_name} is ${edge_status} — network segments may be affected"