# ===========================================================
#  InfraGuardian360 ŌĆö HertzBeat Monitor Template
#  Device: Samsung / HP (Samsung) Printers and MFPs
#  Covers: Samsung Xpress, ProXpress, MultiXpress series
#          Also works on: HP branded Samsung devices (post-2017 acquisition)
#  Protocol: SNMP v1/v2c (PRINTER-MIB + Samsung vendor MIBs)
#  Vendor OID: .1.3.6.1.4.1.236 (Samsung)
# ===========================================================

category: network
app: samsung_printer
name:
  zh-CN: õĖēµś¤µēōÕŹ░µ£║
  en-US: Samsung / HP-Samsung Printer

params:
  - field: host
    name:
      en-US: Host Address
    type: host
    required: true
  - field: port
    name:
      en-US: SNMP Port
    type: number
    defaultValue: 161
    required: true
  - field: snmpVersion
    name:
      en-US: SNMP Version
    type: radio
    required: true
    options:
      - label: "v1"
        value: 1
      - label: "v2c"
        value: 2
    defaultValue: 1
  - field: community
    name:
      en-US: SNMP Community
    type: text
    defaultValue: public

metrics:

  - name: printer_info
    priority: 0
    fields:
      - field: printer_name
        type: 1
        label: true
      - field: model
        type: 1
      - field: serial_number
        type: 1
      - field: firmware_version
        type: 1
      - field: mac_address
        type: 1
      - field: printer_status
        type: 1
      - field: uptime_seconds
        type: 0
        unit: s
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 15000
      oids:
        printer_name:     1.3.6.1.2.1.1.5.0
        model:            1.3.6.1.4.1.236.11.5.11.81.1.1.0
        serial_number:    1.3.6.1.4.1.236.11.5.11.81.1.3.0
        firmware_version: 1.3.6.1.4.1.236.11.5.11.81.1.4.0
        mac_address:      1.3.6.1.4.1.236.11.5.11.81.1.6.0
        printer_status:   1.3.6.1.2.1.25.3.5.1.1.1
        uptime_seconds:   1.3.6.1.2.1.1.3.0

  - name: consumables
    priority: 1
    fields:
      - field: marker_name
        type: 1
        label: true
      - field: marker_color
        type: 1
      - field: max_capacity
        type: 0
      - field: current_level
        type: 0
      - field: level_percent
        type: 0
        unit: '%'
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 15000
      oids:
        marker_name:   1.3.6.1.2.1.43.11.1.1.6.1
        marker_color:  1.3.6.1.2.1.43.12.1.1.4.1
        max_capacity:  1.3.6.1.2.1.43.11.1.1.8.1
        current_level: 1.3.6.1.2.1.43.11.1.1.9.1

  - name: samsung_toner
    priority: 2
    fields:
      - field: black_toner_percent
        type: 0
        unit: '%'
      - field: cyan_toner_percent
        type: 0
        unit: '%'
      - field: magenta_toner_percent
        type: 0
        unit: '%'
      - field: yellow_toner_percent
        type: 0
        unit: '%'
      - field: drum_life_percent
        type: 0
        unit: '%'
      - field: fuser_life_percent
        type: 0
        unit: '%'
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 15000
      oids:
        black_toner_percent:   1.3.6.1.4.1.236.11.5.11.81.3.1.0
        cyan_toner_percent:    1.3.6.1.4.1.236.11.5.11.81.3.2.0
        magenta_toner_percent: 1.3.6.1.4.1.236.11.5.11.81.3.3.0
        yellow_toner_percent:  1.3.6.1.4.1.236.11.5.11.81.3.4.0
        drum_life_percent:     1.3.6.1.4.1.236.11.5.11.81.3.10.0
        fuser_life_percent:    1.3.6.1.4.1.236.11.5.11.81.3.11.0

  - name: page_counts
    priority: 3
    fields:
      - field: total_pages_printed
        type: 0
      - field: colour_pages_printed
        type: 0
      - field: mono_pages_printed
        type: 0
      - field: copy_pages
        type: 0
      - field: fax_pages
        type: 0
      - field: scan_jobs
        type: 0
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 15000
      oids:
        total_pages_printed:  1.3.6.1.2.1.43.10.2.1.4.1.1
        colour_pages_printed: 1.3.6.1.4.1.236.11.5.11.81.2.2.0
        mono_pages_printed:   1.3.6.1.4.1.236.11.5.11.81.2.1.0
        copy_pages:           1.3.6.1.4.1.236.11.5.11.81.2.3.0
        fax_pages:            1.3.6.1.4.1.236.11.5.11.81.2.4.0
        scan_jobs:            1.3.6.1.4.1.236.11.5.11.81.2.5.0

  - name: paper_trays
    priority: 4
    fields:
      - field: tray_name
        type: 1
        label: true
      - field: tray_status
        type: 1
      - field: tray_media_size
        type: 1
      - field: tray_capacity
        type: 0
      - field: tray_level
        type: 0
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 15000
      oids:
        tray_name:       1.3.6.1.2.1.43.8.2.1.13.1
        tray_status:     1.3.6.1.2.1.43.8.2.1.11.1
        tray_media_size: 1.3.6.1.2.1.43.8.2.1.15.1
        tray_capacity:   1.3.6.1.2.1.43.8.2.1.9.1
        tray_level:      1.3.6.1.2.1.43.8.2.1.10.1

  - name: device_errors
    priority: 5
    fields:
      - field: error_description
        type: 1
        label: true
      - field: error_severity
        type: 1
      - field: error_group
        type: 1
    protocol: snmp
    snmp:
      host: ^_^host^_^
      port: ^_^port^_^
      version: ^_^snmpVersion^_^
      community: ^_^community^_^
      timeout: 15000
      oids:
        error_description: 1.3.6.1.2.1.43.18.1.1.7.1
        error_severity:    1.3.6.1.2.1.43.18.1.1.2.1
        error_group:       1.3.6.1.2.1.43.18.1.1.4.1

alerts:
  - metric: samsung_toner
    field: black_toner_percent
    preset: true
    expr: "black_toner_percent < 10"
    for: 1m
    severity: critical
    content: "Samsung printer ${host} black toner critically low at ${black_toner_percent}%"

  - metric: samsung_toner
    field: black_toner_percent
    preset: true
    expr: "black_toner_percent < 20"
    for: 1m
    severity: warning
    content: "Samsung printer ${host} black toner low at ${black_toner_percent}% ŌĆö order replacement"

  - metric: samsung_toner
    field: cyan_toner_percent
    preset: true
    expr: "cyan_toner_percent < 15"
    for: 1m
    severity: warning
    content: "Samsung printer ${host} cyan toner at ${cyan_toner_percent}%"

  - metric: samsung_toner
    field: magenta_toner_percent
    preset: true
    expr: "magenta_toner_percent < 15"
    for: 1m
    severity: warning
    content: "Samsung printer ${host} magenta toner at ${magenta_toner_percent}%"

  - metric: samsung_toner
    field: yellow_toner_percent
    preset: true
    expr: "yellow_toner_percent < 15"
    for: 1m
    severity: warning
    content: "Samsung printer ${host} yellow toner at ${yellow_toner_percent}%"

  - metric: samsung_toner
    field: drum_life_percent
    preset: true
    expr: "drum_life_percent < 10"
    for: 1m
    severity: warning
    content: "Samsung printer ${host} drum life at ${drum_life_percent}% ŌĆö replace drum soon"

  - metric: printer_info
    field: printer_status
    preset: true
    expr: "printer_status == 5"
    for: 2m
    severity: critical
    content: "Samsung printer ${host} is in ERROR state"