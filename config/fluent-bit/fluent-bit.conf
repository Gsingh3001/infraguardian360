# ============================================================
#  InfraGuardian360 — Fluent Bit Configuration
#  Collects: Docker container logs, syslog, auth logs,
#            kernel logs, and application logs
#  Ships to: OpenSearch ig360-logs-* indices
# ============================================================

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     warn
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    storage.path  /fluent-bit/db/
    storage.sync  normal
    storage.checksum off
    storage.backlog.mem_limit 50M

# ============================================================
#  INPUTS
# ============================================================

# ── All Docker container logs ─────────────────────────────────
[INPUT]
    Name              tail
    Tag               docker.*
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    DB                /fluent-bit/db/docker.db
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  10
    Read_from_Head    False

# ── System syslog ─────────────────────────────────────────────
[INPUT]
    Name              tail
    Tag               syslog
    Path              /var/log/syslog
    Parser            syslog-rfc3164
    DB                /fluent-bit/db/syslog.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Refresh_Interval  30

# ── Authentication logs ───────────────────────────────────────
[INPUT]
    Name              tail
    Tag               auth
    Path              /var/log/auth.log
    Parser            syslog-rfc3164
    DB                /fluent-bit/db/auth.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Refresh_Interval  30

# ── Kernel logs ───────────────────────────────────────────────
[INPUT]
    Name              tail
    Tag               kernel
    Path              /var/log/kern.log
    Parser            syslog-rfc3164
    DB                /fluent-bit/db/kern.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

# ── Systemd journal ───────────────────────────────────────────
[INPUT]
    Name              systemd
    Tag               systemd.*
    Systemd_Filter    _SYSTEMD_UNIT=docker.service
    Systemd_Filter    _SYSTEMD_UNIT=ssh.service
    Read_From_Tail    On
    Strip_Underscores On

# ============================================================
#  FILTERS
# ============================================================

# ── Add hostname and platform to all records ─────────────────
[FILTER]
    Name    record_modifier
    Match   *
    Record  hostname ${HOSTNAME}
    Record  platform infraguardian360
    Record  environment production

# ── Parse Docker log JSON ─────────────────────────────────────
[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       docker-json
    Reserve_Data True

# ── Extract container name from Docker tag ───────────────────
[FILTER]
    Name         lua
    Match        docker.*
    script       /fluent-bit/etc/docker-metadata.lua
    call         extract_metadata

# ── Filter out noisy health check logs ───────────────────────
[FILTER]
    Name    grep
    Match   docker.*
    Exclude log GET /health
    Exclude log GET /ping
    Exclude log GET /metrics

# ── Mark auth failures as high severity ──────────────────────
[FILTER]
    Name    rewrite_tag
    Match   auth
    Rule    $log ^.*Failed password.* auth.failure false
    Rule    $log ^.*Invalid user.* auth.failure false
    Rule    $log ^.*authentication failure.* auth.failure false

# ============================================================
#  OUTPUTS
# ============================================================

# ── Docker logs → OpenSearch ──────────────────────────────────
[OUTPUT]
    Name            opensearch
    Match           docker.*
    Host            ${OPENSEARCH_HOST}
    Port            ${OPENSEARCH_PORT}
    HTTP_User       ${OPENSEARCH_USER}
    HTTP_Passwd     ${OPENSEARCH_PASSWORD}
    Index           ig360-docker-logs
    Type            _doc
    tls             On
    tls.verify      Off
    Suppress_Type_Name On
    Retry_Limit     5
    Buffer_Size     False

# ── Syslog → OpenSearch ───────────────────────────────────────
[OUTPUT]
    Name            opensearch
    Match           syslog
    Host            ${OPENSEARCH_HOST}
    Port            ${OPENSEARCH_PORT}
    HTTP_User       ${OPENSEARCH_USER}
    HTTP_Passwd     ${OPENSEARCH_PASSWORD}
    Index           ig360-syslog
    Type            _doc
    tls             On
    tls.verify      Off
    Suppress_Type_Name On
    Retry_Limit     5

# ── Auth logs → OpenSearch ────────────────────────────────────
[OUTPUT]
    Name            opensearch
    Match           auth*
    Host            ${OPENSEARCH_HOST}
    Port            ${OPENSEARCH_PORT}
    HTTP_User       ${OPENSEARCH_USER}
    HTTP_Passwd     ${OPENSEARCH_PASSWORD}
    Index           ig360-auth-logs
    Type            _doc
    tls             On
    tls.verify      Off
    Suppress_Type_Name On
    Retry_Limit     5

# ── Systemd → OpenSearch ──────────────────────────────────────
[OUTPUT]
    Name            opensearch
    Match           systemd.*
    Host            ${OPENSEARCH_HOST}
    Port            ${OPENSEARCH_PORT}
    HTTP_User       ${OPENSEARCH_USER}
    HTTP_Passwd     ${OPENSEARCH_PASSWORD}
    Index           ig360-systemd
    Type            _doc
    tls             On
    tls.verify      Off
    Suppress_Type_Name On
    Retry_Limit     5

# ── Metrics endpoint for Prometheus scraping ─────────────────
[OUTPUT]
    Name     prometheus_exporter
    Match    *
    Host     0.0.0.0
    Port     2021