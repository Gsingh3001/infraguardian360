# ============================================================
#  Netdisco Configuration — InfraGuardian360
#  Replace SEED_SWITCH_IP with your first switch IP
#  Replace SNMP_COMMUNITY with your SNMPv3 credentials
# ============================================================

# Database connection (managed by Docker env vars)
database:
  name: netdisco
  user: netdisco
  pass: changeme

# SNMP credentials — add all your community strings here
snmp_auth:
  # SNMPv2c (basic — use SNMPv3 for production)
  - tag: default_v2
    community: public
    version: 2

  # SNMPv3 (recommended for production)
  - tag: default_v3
    user: ig360monitor
    auth: SHA
    auth_pass: changeme_auth_pass
    priv: AES
    priv_pass: changeme_priv_pass
    version: 3

# Seed devices — Netdisco starts here and walks LLDP/CDP chains
# Add your first switch or router IP — it discovers everything else
discover_nodes:
  - 192.168.1.1    # Replace with your seed switch IP

# Networks to discover — Netdisco scans these for devices
discover_subnets:
  - 192.168.1.0/24    # Replace with your network subnet
  - 192.168.0.0/24

# Device classification
device_identity:
  - tag: cisco_switch
    oid: .1.3.6.1.4.1.9
    role: switch
  - tag: hp_switch
    oid: .1.3.6.1.4.1.11
    role: switch
  - tag: aruba_ap
    oid: .1.3.6.1.4.1.14823
    role: access_point
  - tag: ubiquiti_ap
    oid: .1.3.6.1.4.1.41112
    role: access_point
  - tag: hp_printer
    oid: .1.3.6.1.4.1.11.2.3.9
    role: printer
  - tag: cisco_phone
    oid: .1.3.6.1.4.1.9.6.1
    role: phone

# Job scheduling
schedule:
  discover:     "0 2 * * *"    # Full topology crawl — 2am daily
  macsuck:      "0 * * * *"    # MAC table refresh — hourly
  arpnip:       "*/30 * * * *" # ARP table refresh — every 30 min
  nbtstat:      "0 3 * * *"    # NetBIOS scan — 3am daily

# Polling settings
polling:
  snmp_timeout: 10
  snmp_retries: 2
  max_threads: 20

# What to discover
extra_node_properties:
  - description
  - contact
  - location
  - name
  - serial
  - model
  - os_ver
  - vendor
  - layers
  - mac
  - chassis_id

# Exclude management IPs from topology
ignore_private_nets: false
ignore_interfaces:
  - Loopback
  - Null
  - Vlan1